<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name — AI ツール制作</title>
  <meta name="description" content="AIで業務の無駄を削る小さなツールを作っています。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__logo" href="index.html" data-site-name>Your Name</a>
      <nav class="site-nav">
        <a href="#tools">Tools</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- Profile -->
    <section class="profile">
      <div class="container">
        <div class="profile__inner">
          <div class="profile__photo" aria-hidden="true"></div>
          <div class="profile__body">
            <h1 class="profile__title" id="profile-title">AIで、現場の仕事を速くする。</h1>
            <p class="profile__bio" id="profile-bio"></p>
            <a class="profile__contact" href="mailto:your@email.com" id="profile-contact">お問い合わせ →</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Featured Tools -->
    <section class="section" id="tools">
      <div class="container">
        <p class="section__eyebrow">Featured</p>
        <div class="tools-grid tools-grid--featured" id="featured-tools"></div>
      </div>
    </section>

    <!-- Other Tools -->
    <section class="section" style="padding-top: 0;" id="other-tools-section">
      <div class="container">
        <p class="section__eyebrow">Other Work</p>
        <div class="tools-grid tools-grid--other" id="other-tools"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <p class="site-footer__copy">© <span id="copy-year"></span> <span data-site-name>Your Name</span></p>
        <p class="site-footer__note">このサイトもバイブコーディングで作っています</p>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('[data-site-name]').forEach(function (el) {
        el.textContent = SITE.name;
      });
      document.getElementById('profile-title').textContent = SITE.tagline;
      document.getElementById('profile-bio').textContent = SITE.about;
      document.getElementById('profile-contact').href = 'mailto:' + SITE.email;
      document.getElementById('copy-year').textContent = new Date().getFullYear();

      var featuredEl = document.getElementById('featured-tools');
      TOOLS.filter(function (t) { return t.featured; }).forEach(function (tool) {
        var thumbStyle = tool.thumb ? ' style="background:' + tool.thumb + '"' : '';
        featuredEl.insertAdjacentHTML('beforeend',
          '<a class="tool-item" href="' + tool.href + '">'
          + '<div class="tool-item__thumb"' + thumbStyle + '></div>'
          + '<h3 class="tool-item__name">' + tool.name + '</h3>'
          + '<p class="tool-item__desc">' + tool.description + '</p>'
          + '</a>'
        );
      });

      var otherEl = document.getElementById('other-tools');
      TOOLS.filter(function (t) { return !t.featured; }).forEach(function (tool) {
        var thumbStyle = tool.thumb ? ' style="background:' + tool.thumb + '"' : '';
        otherEl.insertAdjacentHTML('beforeend',
          '<a class="tool-item" href="' + tool.href + '">'
          + '<div class="tool-item__thumb"' + thumbStyle + '></div>'
          + '<h3 class="tool-item__name">' + tool.name + '</h3>'
          + '<p class="tool-item__desc">' + tool.description + '</p>'
          + '</a>'
        );
      });
    });
  </script>

</body>
</html>
